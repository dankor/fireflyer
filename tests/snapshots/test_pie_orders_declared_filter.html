<style>/* ── Theme tokens ───────────────────────────────────────────────────────────
   Light + dark palettes as CSS custom properties. Selection is automatic
   (prefers-color-scheme) unless a `data-ff-theme="light|dark"` attribute on this
   chart, its `.fireflyer-chart-root` wrapper, or any ancestor (e.g. the
   dashboard, or <html> in the editor) overrides it. Mirrored across every
   chart.css and dashboard.css — no shared stylesheet by design (architecture.md,
   "Theming"). Keep the palettes in sync. */
.fireflyer-chart {
  --ff-ink: #20242b;
  --ff-title: #323232;
  --ff-muted: #5e6975;
  --ff-faint: #8a929c;
  --ff-panel: #ffffff;
  --ff-border: #e0e0e0;
  --ff-border-strong: #d6d8dc;
  --ff-accent: #20a7c9;
  --ff-tooltip-bg: #20242b;
  --ff-tooltip-ink: #ffffff;
  --ff-shadow: rgba(0, 0, 0, 0.04);
  --ff-shadow-strong: rgba(0, 0, 0, 0.18);
}
@media (prefers-color-scheme: dark) {
  .fireflyer-chart {
    --ff-ink: #e6e8ec;
    --ff-title: #f2f4f7;
    --ff-muted: #a3adbd;
    --ff-faint: #7f8a99;
    --ff-panel: #1b2635;
    --ff-border: #2c384a;
    --ff-border-strong: #3a475c;
    --ff-accent: #20a7c9;
    --ff-tooltip-bg: #0c1320;
    --ff-tooltip-ink: #e6e8ec;
    --ff-shadow: rgba(0, 0, 0, 0.4);
    --ff-shadow-strong: rgba(0, 0, 0, 0.55);
  }
}
[data-ff-theme="light"] .fireflyer-chart,
.fireflyer-chart[data-ff-theme="light"] {
  --ff-ink: #20242b;
  --ff-title: #323232;
  --ff-muted: #5e6975;
  --ff-faint: #8a929c;
  --ff-panel: #ffffff;
  --ff-border: #e0e0e0;
  --ff-border-strong: #d6d8dc;
  --ff-accent: #20a7c9;
  --ff-tooltip-bg: #20242b;
  --ff-tooltip-ink: #ffffff;
  --ff-shadow: rgba(0, 0, 0, 0.04);
  --ff-shadow-strong: rgba(0, 0, 0, 0.18);
}
[data-ff-theme="dark"] .fireflyer-chart,
.fireflyer-chart[data-ff-theme="dark"] {
  --ff-ink: #e6e8ec;
  --ff-title: #f2f4f7;
  --ff-muted: #a3adbd;
  --ff-faint: #7f8a99;
  --ff-panel: #1b2635;
  --ff-border: #2c384a;
  --ff-border-strong: #3a475c;
  --ff-accent: #20a7c9;
  --ff-tooltip-bg: #0c1320;
  --ff-tooltip-ink: #e6e8ec;
  --ff-shadow: rgba(0, 0, 0, 0.4);
  --ff-shadow-strong: rgba(0, 0, 0, 0.55);
}

.fireflyer-chart {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Helvetica, Arial, sans-serif;
  color: var(--ff-ink);
  background: var(--ff-panel);
  border: 1px solid var(--ff-border);
  border-radius: 4px;
  padding: 16px 20px;
  box-shadow: 0 1px 2px var(--ff-shadow);
  margin: 0 0 16px 0;
}
.fireflyer-chart .fireflyer-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--ff-title);
  letter-spacing: -0.01em;
  margin: 0 0 12px 0;
}
/* Flex column so the layout below the title can fill the card's height
   and center its content when the dashboard row is tall. */
.fireflyer-pie {
  display: flex;
  flex-direction: column;
}
.fireflyer-pie-layout {
  flex: 1 1 auto;
  /* min-height: 0 lets the layout shrink below its content size, and overflow:
     auto then scrolls when the donut + legend don't fit the dashboard cell. */
  min-height: 0;
  overflow: auto;
  display: flex;
  gap: 24px;
  /* `safe center` keeps content centered when it fits, but falls back to
     flex-start when it overflows so the top stays scrollable. */
  align-items: safe center;
  justify-content: safe center;
  flex-wrap: wrap;
}
.fireflyer-pie-canvas {
  position: relative;
  width: 220px;
  height: 220px;
  flex-shrink: 0;
}
.fireflyer-pie svg { display: block; }
/* Slice separators and the donut hole take the card colour so slices read as
   distinct on any theme (each slice's fill is data-driven, set inline). Only
   multi-slice paths get a separator stroke; a lone full-circle slice has none. */
.fireflyer-pie svg path { stroke: var(--ff-panel); }
.fireflyer-pie-hole { fill: var(--ff-panel); }
.fireflyer-pie svg path,
.fireflyer-pie svg circle[data-i] { cursor: pointer; transition: filter 0.15s ease; }
.fireflyer-pie svg path:hover,
.fireflyer-pie svg circle[data-i]:hover { filter: brightness(1.1); }
/* When the chart has at least one slice selected via crossfilter, fade the
   unselected slices so the active selection reads at a glance. */
.fireflyer-pie.has-selection [data-active="0"] { opacity: 0.35; }
.fireflyer-pie.has-selection .fireflyer-legend li:not(.active) { opacity: 0.55; }
.fireflyer-pie.has-selection .fireflyer-legend li.active .label { font-weight: 600; }
.fireflyer-pie-tooltip {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  background: var(--ff-tooltip-bg);
  color: var(--ff-tooltip-ink);
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  padding: 6px 10px;
  border-radius: 3px;
  white-space: nowrap;
  box-shadow: 0 2px 6px var(--ff-shadow-strong);
  opacity: 0;
  transition: opacity 0.12s ease;
  z-index: 2;
}
.fireflyer-pie-tooltip-label { font-weight: 600; margin-right: 6px; }
.fireflyer-pie-tooltip-meta { opacity: 0.85; }
.fireflyer-pie .fireflyer-legend {
  list-style: none;
  padding: 0;
  margin: 0;
  font-size: 13px;
  color: var(--ff-ink);
}
.fireflyer-pie .fireflyer-legend li {
  display: flex;
  align-items: center;
  padding: 3px 0;
  white-space: nowrap;
}
.fireflyer-pie .fireflyer-legend .swatch {
  display: inline-block;
  width: 12px;
  height: 12px;
  border-radius: 2px;
  margin-right: 8px;
  flex-shrink: 0;
}
.fireflyer-pie .fireflyer-legend .label { color: var(--ff-ink); }
.fireflyer-pie .fireflyer-legend .meta {
  color: var(--ff-muted);
  margin-left: 6px;
  font-variant-numeric: tabular-nums;
}
</style>
<style>
.fireflyer-pie-canvas:has(svg [data-i="0"]:hover) .fireflyer-pie-tooltip[data-i="0"] { opacity: 1; }
.fireflyer-pie-canvas:has(svg [data-i="1"]:hover) .fireflyer-pie-tooltip[data-i="1"] { opacity: 1; }
</style>
<article class="fireflyer-chart fireflyer-pie">
  <div class="fireflyer-title">Open orders</div>
  <div class="fireflyer-pie-layout">
    <div class="fireflyer-pie-canvas">
      <svg viewBox="0 0 220 220" width="220" height="220" xmlns="http://www.w3.org/2000/svg">
        <path d="M 110.00 20.00 A 90 90 0 1 1 32.06 155.00 L 63.23 137.00 A 54 54 0 1 0 110.00 56.00 Z" fill="#1FA8C9" stroke-width="1.5" data-i="0" aria-label="paid: 4 (66.7%)" />
        <path d="M 32.06 155.00 A 90 90 0 0 1 110.00 20.00 L 110.00 56.00 A 54 54 0 0 0 63.23 137.00 Z" fill="#454E7C" stroke-width="1.5" data-i="1" aria-label="pending: 2 (33.3%)" />
      </svg>
      <div class="fireflyer-pie-tooltip" data-i="0" role="tooltip">
        <span class="fireflyer-pie-tooltip-label">paid</span>
        <span class="fireflyer-pie-tooltip-meta">4 · 66.7%</span>
      </div>
      <div class="fireflyer-pie-tooltip" data-i="1" role="tooltip">
        <span class="fireflyer-pie-tooltip-label">pending</span>
        <span class="fireflyer-pie-tooltip-meta">2 · 33.3%</span>
      </div>
    </div>
    <ul class="fireflyer-legend">
      <li>
        <span class="swatch" style="background:#1FA8C9;"></span>
        <span class="label">paid</span>
        <span class="meta">4 · 66.7%</span>
      </li>
      <li>
        <span class="swatch" style="background:#454E7C;"></span>
        <span class="label">pending</span>
        <span class="meta">2 · 33.3%</span>
      </li>
    </ul>
  </div>
</article>
