<style>.fireflyer-chart {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Helvetica, Arial, sans-serif;
  color: #20242b;
  background: #ffffff;
  border: 1px solid #e0e0e0;
  border-radius: 4px;
  padding: 16px 20px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  margin: 0 0 16px 0;
}
.fireflyer-chart .fireflyer-title {
  font-size: 15px;
  font-weight: 600;
  color: #323232;
  letter-spacing: -0.01em;
  margin: 0 0 12px 0;
}
/* Flex column so the SVG can fill the card's available height when the
   dashboard row stretches the card past its natural content height. */
.fireflyer-bar {
  display: flex;
  flex-direction: column;
}
.fireflyer-bar-canvas {
  flex: 1 1 auto;
  /* min-height: 0 lets the canvas shrink below content size when the cell
     is short; preserveAspectRatio in the SVG keeps the bars readable. */
  min-height: 0;
  display: flex;
  align-items: stretch;
  justify-content: center;
}
.fireflyer-bar svg {
  width: 100%;
  height: 100%;
  max-height: 320px;
  display: block;
}
.fireflyer-bar svg rect {
  cursor: default;
  transition: filter 0.15s ease;
}
.fireflyer-bar svg rect:hover { filter: brightness(1.08); }
</style>
<article class="fireflyer-chart fireflyer-bar">
  <div class="fireflyer-title">Orders by Day</div>
  <div class="fireflyer-bar-canvas">
    <svg viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <line x1="30" y1="196" x2="340" y2="196" stroke="#d6d8dc" stroke-width="1" />
      <rect x="30.00" y="16.00" width="70.00" height="180.00" fill="#1FA8C9" rx="2" data-i="0" aria-label="Mon: 3" />
      <text x="65.00" y="12.00" text-anchor="middle" font-size="11" fill="#20242b" class="fireflyer-bar-value">3</text>
      <text x="65.00" y="212.00" text-anchor="middle" font-size="11" fill="#5e6975" class="fireflyer-bar-label">Mon</text>
      <rect x="110.00" y="76.00" width="70.00" height="120.00" fill="#1FA8C9" rx="2" data-i="1" aria-label="Tue: 2" />
      <text x="145.00" y="72.00" text-anchor="middle" font-size="11" fill="#20242b" class="fireflyer-bar-value">2</text>
      <text x="145.00" y="212.00" text-anchor="middle" font-size="11" fill="#5e6975" class="fireflyer-bar-label">Tue</text>
      <rect x="190.00" y="136.00" width="70.00" height="60.00" fill="#1FA8C9" rx="2" data-i="2" aria-label="Wed: 1" />
      <text x="225.00" y="132.00" text-anchor="middle" font-size="11" fill="#20242b" class="fireflyer-bar-value">1</text>
      <text x="225.00" y="212.00" text-anchor="middle" font-size="11" fill="#5e6975" class="fireflyer-bar-label">Wed</text>
      <rect x="270.00" y="136.00" width="70.00" height="60.00" fill="#1FA8C9" rx="2" data-i="3" aria-label="Thu: 1" />
      <text x="305.00" y="132.00" text-anchor="middle" font-size="11" fill="#20242b" class="fireflyer-bar-value">1</text>
      <text x="305.00" y="212.00" text-anchor="middle" font-size="11" fill="#5e6975" class="fireflyer-bar-label">Thu</text>
    </svg>
  </div>
</article>
