<style>.fireflyer-chart {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Helvetica, Arial, sans-serif;
  color: #20242b;
  background: #ffffff;
  border: 1px solid #e0e0e0;
  border-radius: 4px;
  padding: 16px 20px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  margin: 0 0 16px 0;
}
.fireflyer-chart .fireflyer-title {
  font-size: 15px;
  font-weight: 600;
  color: #323232;
  letter-spacing: -0.01em;
  margin: 0 0 12px 0;
}
.fireflyer-bar {
  display: flex;
  flex-direction: column;
}
.fireflyer-bar-layout {
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  gap: 24px;
  align-items: safe center;
  justify-content: safe center;
  flex-wrap: wrap;
  overflow: auto;
}
.fireflyer-bar-canvas {
  position: relative;
  flex: 1 1 280px;
  min-width: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fireflyer-bar svg {
  width: 100%;
  height: auto;
  max-width: 480px;
  max-height: 320px;
  display: block;
}
.fireflyer-bar svg rect {
  cursor: pointer;
  transition: filter 0.15s ease, opacity 0.15s ease;
}
.fireflyer-bar svg rect:hover { filter: brightness(1.08); }
/* When the chart has any active selection, fade non-selected segments —
   mirrors the pie chart's `has-selection` styling so multi-chart dashboards
   read consistently. */
.fireflyer-bar.has-selection [data-active="0"] { opacity: 0.35; }
.fireflyer-bar.has-selection .fireflyer-legend li:not(.active) { opacity: 0.55; }
.fireflyer-bar.has-selection .fireflyer-legend li.active .label { font-weight: 600; }

/* Hover tooltip — one per segment, positioned over the canvas top. CSS-only
   reveal via :has() on the canvas; inline rules in chart.html bind each
   tooltip to its rect by `data-i`. */
.fireflyer-bar-tooltip {
  position: absolute;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
  background: #20242b;
  color: #ffffff;
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  padding: 5px 10px;
  border-radius: 3px;
  white-space: nowrap;
  box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  opacity: 0;
  transition: opacity 0.12s ease;
  z-index: 2;
}
.fireflyer-bar-tooltip-label { font-weight: 600; margin-right: 6px; }
.fireflyer-bar-tooltip-meta { opacity: 0.85; }

.fireflyer-bar .fireflyer-legend {
  list-style: none;
  padding: 0;
  margin: 0;
  font-size: 13px;
  color: #20242b;
}
.fireflyer-bar .fireflyer-legend li {
  display: flex;
  align-items: center;
  padding: 3px 0;
  white-space: nowrap;
}
.fireflyer-bar .fireflyer-legend .swatch {
  display: inline-block;
  width: 12px;
  height: 12px;
  border-radius: 2px;
  margin-right: 8px;
  flex-shrink: 0;
}
.fireflyer-bar .fireflyer-legend .label { color: #20242b; }
.fireflyer-bar .fireflyer-legend .meta {
  color: #5e6975;
  margin-left: 6px;
  font-variant-numeric: tabular-nums;
}
</style>
<style>
.fireflyer-bar-canvas:has(svg rect[data-i="0"]:hover) .fireflyer-bar-tooltip[data-i="0"] { opacity: 1; }
.fireflyer-bar-canvas:has(svg rect[data-i="1"]:hover) .fireflyer-bar-tooltip[data-i="1"] { opacity: 1; }
.fireflyer-bar-canvas:has(svg rect[data-i="2"]:hover) .fireflyer-bar-tooltip[data-i="2"] { opacity: 1; }
.fireflyer-bar-canvas:has(svg rect[data-i="3"]:hover) .fireflyer-bar-tooltip[data-i="3"] { opacity: 1; }
.fireflyer-bar-canvas:has(svg rect[data-i="4"]:hover) .fireflyer-bar-tooltip[data-i="4"] { opacity: 1; }
</style>
<article class="fireflyer-chart fireflyer-bar">
  <div class="fireflyer-title">Orders by Day, stacked by status</div>
  <div class="fireflyer-bar-layout">
    <div class="fireflyer-bar-canvas">
      <svg viewBox="0 0 380 260" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
        <line x1="32" y1="206" x2="364" y2="206" stroke="#d6d8dc" stroke-width="1" />
        <rect x="32.00" y="16.00" width="75.50" height="190.00" fill="#1FA8C9" data-i="0" aria-label="2026-06-01 · paid: 3" />
        <text x="69.75" y="12.00" text-anchor="middle" font-size="11" fill="#20242b" class="fireflyer-bar-value">3</text>
        <text x="69.75" y="220.00" text-anchor="end" font-size="10" fill="#5e6975" transform="rotate(-30 69.75 220.00)" class="fireflyer-bar-label">2026-06-01</text>
        <rect x="117.50" y="142.67" width="75.50" height="63.33" fill="#1FA8C9" data-i="1" aria-label="2026-06-02 · paid: 1" />
        <rect x="117.50" y="79.33" width="75.50" height="63.33" fill="#454E7C" data-i="2" aria-label="2026-06-02 · pending: 1" />
        <text x="155.25" y="75.33" text-anchor="middle" font-size="11" fill="#20242b" class="fireflyer-bar-value">2</text>
        <text x="155.25" y="220.00" text-anchor="end" font-size="10" fill="#5e6975" transform="rotate(-30 155.25 220.00)" class="fireflyer-bar-label">2026-06-02</text>
        <rect x="203.00" y="142.67" width="75.50" height="63.33" fill="#5AC189" data-i="3" aria-label="2026-06-03 · cancelled: 1" />
        <text x="240.75" y="138.67" text-anchor="middle" font-size="11" fill="#20242b" class="fireflyer-bar-value">1</text>
        <text x="240.75" y="220.00" text-anchor="end" font-size="10" fill="#5e6975" transform="rotate(-30 240.75 220.00)" class="fireflyer-bar-label">2026-06-03</text>
        <rect x="288.50" y="142.67" width="75.50" height="63.33" fill="#454E7C" data-i="4" aria-label="2026-06-04 · pending: 1" />
        <text x="326.25" y="138.67" text-anchor="middle" font-size="11" fill="#20242b" class="fireflyer-bar-value">1</text>
        <text x="326.25" y="220.00" text-anchor="end" font-size="10" fill="#5e6975" transform="rotate(-30 326.25 220.00)" class="fireflyer-bar-label">2026-06-04</text>
      </svg>
      <div class="fireflyer-bar-tooltip" data-i="0" role="tooltip">
        <span class="fireflyer-bar-tooltip-label">2026-06-01 · paid</span>
        <span class="fireflyer-bar-tooltip-meta">3</span>
      </div>
      <div class="fireflyer-bar-tooltip" data-i="1" role="tooltip">
        <span class="fireflyer-bar-tooltip-label">2026-06-02 · paid</span>
        <span class="fireflyer-bar-tooltip-meta">1</span>
      </div>
      <div class="fireflyer-bar-tooltip" data-i="2" role="tooltip">
        <span class="fireflyer-bar-tooltip-label">2026-06-02 · pending</span>
        <span class="fireflyer-bar-tooltip-meta">1</span>
      </div>
      <div class="fireflyer-bar-tooltip" data-i="3" role="tooltip">
        <span class="fireflyer-bar-tooltip-label">2026-06-03 · cancelled</span>
        <span class="fireflyer-bar-tooltip-meta">1</span>
      </div>
      <div class="fireflyer-bar-tooltip" data-i="4" role="tooltip">
        <span class="fireflyer-bar-tooltip-label">2026-06-04 · pending</span>
        <span class="fireflyer-bar-tooltip-meta">1</span>
      </div>
    </div>
    <ul class="fireflyer-legend">
      <li>
        <span class="swatch" style="background:#1FA8C9;"></span>
        <span class="label">paid</span>
        <span class="meta">4</span>
      </li>
      <li>
        <span class="swatch" style="background:#454E7C;"></span>
        <span class="label">pending</span>
        <span class="meta">2</span>
      </li>
      <li>
        <span class="swatch" style="background:#5AC189;"></span>
        <span class="label">cancelled</span>
        <span class="meta">1</span>
      </li>
    </ul>
  </div>
</article>
