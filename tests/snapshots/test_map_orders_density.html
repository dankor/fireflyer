<style>.fireflyer-chart {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Helvetica, Arial, sans-serif;
  color: #20242b;
  background: #ffffff;
  border: 1px solid #e0e0e0;
  border-radius: 4px;
  padding: 16px 20px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  margin: 0 0 16px 0;
}
.fireflyer-chart .fireflyer-title {
  font-size: 15px;
  font-weight: 600;
  color: #323232;
  letter-spacing: -0.01em;
  margin: 0 0 12px 0;
}
.fireflyer-map {
  display: flex;
  flex-direction: column;
}
.fireflyer-map-controls {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
  margin: 0 0 8px 0;
}
.fireflyer-map-control-group {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.fireflyer-map-control-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: #8a929c;
}
.fireflyer-map-zoom {
  width: 24px;
  height: 24px;
  font-size: 16px;
  line-height: 1;
  font-weight: 600;
  color: #20242b;
  background: #ffffff;
  border: 1px solid #d6d8dc;
  border-radius: 4px;
  cursor: pointer;
  padding: 0;
  user-select: none;
}
.fireflyer-map-zoom:hover { background: #eef2f7; }
.fireflyer-map-zoom:active { background: #dde4ed; }
.fireflyer-map-grid {
  font-size: 11px;
  color: #5e6975;
  font-variant-numeric: tabular-nums;
  min-width: 28px;
  text-align: center;
}
/* Responsive canvas — the SVG fills the cell width and height via its own
   `width="100%" height="100%"` attributes and `preserveAspectRatio="meet"`.
   No scroll: the map always fits the available space, and zooming in via
   the controls fetches higher-detail tiles instead of growing the canvas. */
.fireflyer-map-canvas {
  flex: 1 1 auto;
  min-height: 0;
  background: #f5f7fa;
  border-radius: 4px;
  overflow: hidden;
  display: flex;
}
.fireflyer-map svg {
  display: block;
  /* The width/height attributes set responsive sizing; CSS just makes sure
     the SVG can't push past its flex container. */
  max-width: 100%;
  max-height: 100%;
}
.fireflyer-map svg image {
  /* Tiles are decorative; clicks/hover should hit the hex layer. */
  pointer-events: none;
}
.fireflyer-map svg polygon {
  cursor: default;
  transition: filter 0.15s ease;
}
.fireflyer-map svg polygon:hover { filter: brightness(0.9); }
/* Per-hex hover count — single CSS rule covers every hex regardless of how
   many are rendered. The `<text>` is hidden by default and revealed when
   the wrapping `<g>` is hovered. */
.fireflyer-map-hex .fireflyer-map-hex-label {
  opacity: 0;
  pointer-events: none;
  font-size: 11px;
  font-weight: 600;
  fill: #20242b;
  paint-order: stroke;
  stroke: #ffffff;
  stroke-width: 3;
  font-variant-numeric: tabular-nums;
}
.fireflyer-map-hex:hover .fireflyer-map-hex-label { opacity: 1; }

.fireflyer-map-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  margin: 8px 0 0 0;
  font-size: 11px;
  color: #5e6975;
}
.fireflyer-map-bounds {
  font-variant-numeric: tabular-nums;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 10px;
}
.fireflyer-map-legend {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.fireflyer-map-legend-bar {
  display: inline-block;
  width: 80px;
  height: 8px;
  border-radius: 2px;
  border: 1px solid #d6d8dc;
}
.fireflyer-map-legend-label { font-variant-numeric: tabular-nums; }
.fireflyer-map-attribution {
  font-size: 10px;
  color: #8a929c;
}
.fireflyer-map-attribution a {
  color: inherit;
  text-decoration: underline;
}
.fireflyer-map-attribution a:hover { color: #20a7c9; }
</style>
